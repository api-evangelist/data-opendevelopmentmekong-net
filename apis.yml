aid: data-opendevelopmentmekong-net
name: Open Development Mekong
description: >-
  Open Development Mekong is a organization open-data portal for Mekong Region running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 13,483 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
