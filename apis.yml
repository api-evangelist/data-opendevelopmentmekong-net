apis:
  - aid: data-opendevelopmentmekong-net:catalog
    name: Open Development Mekong CKAN Action API
    description: >-
      CKAN Action API for Open Development Mekong, a consistent JSON-over-HTTP interface over a catalog of 13,483 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.opendevelopmentmekong.net/api/3/action/.
